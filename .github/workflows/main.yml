name: Sentinel-IA CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Podríamos levantar bases de datos aquí para testear
      docker:
        image: docker:dind

    steps:
    - name: 📥 Clonando el código
      uses: actions/checkout@v3

    - name: 🐍 Configurando Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Instalando Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔍 Verificación de Calidad (Linter)
      run: |
        # Aquí podrías poner 'flake8' para que revise que tu código sea elegante
        echo "Revisando calidad del código..."

    - name: 🐳 Test de Construcción Docker
      run: |
        docker build -t sentinel-ia:latest .
        echo "✅ Imagen de Docker construida con éxito en la nube."